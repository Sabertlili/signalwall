name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\tests\SignalWall.Tests\SignalWall.Tests.csproj

      - name: Test preset validation
        run: node .\tests\control-center-preset.test.js

      - name: Test
        run: dotnet test .\tests\SignalWall.Tests\SignalWall.Tests.csproj -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory .\TestResults

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: signalwall-test-results
          path: TestResults
          if-no-files-found: error
          retention-days: 14
