name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/build-installer.ps1
      - .github/workflows/build-installer.yml

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build installer
        shell: pwsh
        run: ./scripts/build-installer.ps1

      - name: Upload installer to v0.1.0 release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.0 ./dist/SignalWallSetup-v0.1.0-win-x64.exe --clobber
