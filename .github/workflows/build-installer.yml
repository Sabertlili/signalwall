name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/build-installer.ps1
      - .github/workflows/build-installer.yml

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build installer
        shell: pwsh
        env:
          SIGNALWALL_SIGNING_PFX_BASE64: ${{ secrets.SIGNALWALL_SIGNING_PFX_BASE64 }}
          SIGNALWALL_SIGNING_PFX_PASSWORD: ${{ secrets.SIGNALWALL_SIGNING_PFX_PASSWORD }}
          SIGNALWALL_TIMESTAMP_URL: ${{ vars.SIGNALWALL_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
        run: ./scripts/build-installer.ps1

      - name: Verify installer signature
        shell: pwsh
        env:
          SIGNALWALL_SIGNING_PFX_BASE64: ${{ secrets.SIGNALWALL_SIGNING_PFX_BASE64 }}
        run: |
          $installer = "./dist/SignalWallSetup-v0.1.0-win-x64.exe"
          $signature = Get-AuthenticodeSignature -FilePath $installer
          $signature | Format-List Status,StatusMessage,SignerCertificate,Path

          if ($env:SIGNALWALL_SIGNING_PFX_BASE64 -and $signature.Status -ne "Valid") {
            throw "Installer signing was configured, but the final installer signature is not valid."
          }

      - name: Generate checksum
        shell: pwsh
        run: |
          $installer = "./dist/SignalWallSetup-v0.1.0-win-x64.exe"
          $hash = Get-FileHash -Algorithm SHA256 -Path $installer
          "$($hash.Hash.ToLowerInvariant())  SignalWallSetup-v0.1.0-win-x64.exe" | Set-Content -Encoding utf8 ./dist/SHA256SUMS.txt
          Get-Content ./dist/SHA256SUMS.txt

      - name: Upload installer to v0.1.0 release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.0 ./dist/SignalWallSetup-v0.1.0-win-x64.exe ./dist/SHA256SUMS.txt --clobber
