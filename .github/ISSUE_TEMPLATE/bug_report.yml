name: Bug report
description: Report a reproducible SignalWall problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: monitors
    attributes:
      label: Monitor setup
      placeholder: 3 monitors, 125% / 100% / 100% scaling
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Ran from source
        - Local build
        - Release installer
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
