name: Feature request
description: Suggest an improvement to SignalWall.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should SignalWall do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Wallpaper rendering
        - Multi-monitor behavior
        - Settings UI
        - Installer
        - Quote/theme packs
        - Documentation
        - Other
