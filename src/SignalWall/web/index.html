<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SignalWall Quote Signal</title>
  <style>
    :root {
      --quote-1: #fff8ed;
      --quote-2: #f1cf94;
      --quote-3: #d5faf3;
      --muted: rgba(244,239,228,0.62);
      --accent-1: #f0b35a;
      --accent-2: #5fc4b8;
      --accent-3: #d86c77;
      --bg-top: #0a0b0c;
      --bg-mid: #12100d;
      --bg-bottom: #081011;
      --glow-a: rgba(216,108,119,0.18);
      --glow-b: rgba(95,196,184,0.16);
      --glow-c: rgba(240,179,90,0.18);
      --grid-opacity: 0.46;
      --quote-size: clamp(48px, 8.2vw, 128px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090a;
      color: #f4efe4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(112deg, var(--glow-a), transparent 28%),
        linear-gradient(211deg, var(--glow-b), transparent 38%),
        linear-gradient(300deg, var(--glow-c), transparent 44%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-bottom));
      animation: temperature 18s ease-in-out infinite alternate;
      transform: scale(1.04);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: var(--grid-opacity);
    }

    @keyframes temperature {
      from { filter: hue-rotate(-8deg) saturate(1.02); }
      to { filter: hue-rotate(10deg) saturate(1.16); }
    }

    #field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.72;
    }

    .stage {
      position: relative;
      z-index: 2;
      display: grid;
      min-height: 100%;
      place-items: center;
      padding: clamp(32px, 7vw, 104px);
    }

    .quote-wrap {
      width: min(1180px, 90vw);
      text-align: left;
      will-change: opacity, transform, filter;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(12px, 1.2vw, 15px);
      font-weight: 760;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: clamp(42px, 6vw, 88px);
      height: 1px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    }

    .quote {
      min-height: 2.55em;
      margin: 0;
      font-size: var(--quote-size);
      font-weight: 760;
      line-height: 0.98;
      text-wrap: balance;
      text-shadow: 0 22px 54px rgba(0, 0, 0, 0.42);
    }

    .quote span {
      background: linear-gradient(92deg, var(--quote-1), var(--quote-2) 48%, var(--quote-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .signature {
      min-height: 1.6em;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(15px, 1.4vw, 20px);
      font-weight: 650;
    }

    .progress {
      width: min(360px, 42vw);
      height: 2px;
      margin-top: 38px;
      background: rgba(244,239,228,0.16);
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      transform: scaleX(0);
      transform-origin: left center;
    }

    .fx-fade { animation: fx-fade 520ms ease-out both; }
    .fx-slide { animation: fx-slide 560ms cubic-bezier(0.2, 0.85, 0.2, 1) both; }
    .fx-rise { animation: fx-rise 620ms cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fx-scale { animation: fx-scale 560ms cubic-bezier(0.2, 0.85, 0.2, 1) both; }
    .fx-glitch { animation: fx-glitch 680ms steps(2, end) both; }

    @keyframes fx-fade {
      from { opacity: 0; filter: blur(10px); }
      to { opacity: 1; filter: blur(0); }
    }

    @keyframes fx-slide {
      from { opacity: 0; transform: translateX(-38px); filter: blur(7px); }
      to { opacity: 1; transform: translateX(0); filter: blur(0); }
    }

    @keyframes fx-rise {
      from { opacity: 0; transform: translateY(34px); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fx-scale {
      from { opacity: 0; transform: scale(0.965); filter: blur(7px); }
      to { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    @keyframes fx-glitch {
      0% { opacity: 0; transform: translate(0, 0) skewX(0deg); filter: blur(9px); }
      18% { opacity: 0.72; transform: translate(-8px, 2px) skewX(-1deg); }
      36% { transform: translate(7px, -1px) skewX(1deg); filter: blur(4px); }
      66% { transform: translate(-3px, 1px) skewX(-0.5deg); }
      100% { opacity: 1; transform: translate(0, 0) skewX(0deg); filter: blur(0); }
    }
  </style>
</head>
<body>
  <canvas id="field" aria-hidden="true"></canvas>
  <main class="stage">
    <section class="quote-wrap" id="quoteWrap" aria-live="polite">
      <p class="kicker" id="quoteIndex">Signal 01</p>
      <h1 class="quote" id="quoteText"><span>Every pixel argues for attention. Most should lose.</span></h1>
      <p class="signature" id="quoteAuthor">Design note</p>
      <div class="progress" id="progress"><span id="progressBar"></span></div>
    </section>
  </main>

  <script src="quote-signal-config.js"></script>
  <script>
    const config = window.QUOTE_SIGNAL_CONFIG;
    const query = new URLSearchParams(location.search);
    const state = {
      screenSlot: clamp(Number(query.get("screenSlot")) || 3, 1, 3),
      lastKey: "",
      particles: [],
      palette: [[240, 179, 90], [95, 196, 184], [216, 108, 119]]
    };

    const quoteWrap = document.getElementById("quoteWrap");
    const quoteIndex = document.getElementById("quoteIndex");
    const quoteText = document.getElementById("quoteText");
    const quoteAuthor = document.getElementById("quoteAuthor");
    const progress = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const canvas = document.getElementById("field");
    const ctx = canvas.getContext("2d");

    function settings() {
      return config.defaults.settings;
    }

    function activeTextTheme() {
      const defaults = config.defaults;
      const key = defaults.textThemeMode
        ? defaults.screenTextThemes[`screen${state.screenSlot}`]
        : defaults.globalTextTheme;
      return config.textThemes.find((theme) => theme.id === key) || config.textThemes[0];
    }

    function activeColorTheme() {
      const defaults = config.defaults;
      const key = defaults.colorThemeMode
        ? defaults.screenColorThemes[`screen${state.screenSlot}`]
        : defaults.globalColorTheme;
      return config.colorThemes.find((theme) => theme.id === key) || config.colorThemes[0];
    }

    function applyTheme() {
      const theme = activeColorTheme();
      const root = document.documentElement;
      const scale = settings().textScale / 100;

      root.style.setProperty("--quote-1", theme.text[0]);
      root.style.setProperty("--quote-2", theme.text[1]);
      root.style.setProperty("--quote-3", theme.text[2]);
      root.style.setProperty("--muted", theme.muted);
      root.style.setProperty("--accent-1", theme.accents[0]);
      root.style.setProperty("--accent-2", theme.accents[1]);
      root.style.setProperty("--accent-3", theme.accents[2]);
      root.style.setProperty("--bg-top", theme.background.top);
      root.style.setProperty("--bg-mid", theme.background.middle);
      root.style.setProperty("--bg-bottom", theme.background.bottom);
      root.style.setProperty("--glow-a", theme.background.glowA);
      root.style.setProperty("--glow-b", theme.background.glowB);
      root.style.setProperty("--glow-c", theme.background.glowC);
      root.style.setProperty("--grid-opacity", settings().gridOpacity / 100);
      root.style.setProperty("--quote-size", `clamp(${48 * scale}px, ${8.2 * scale}vw, ${128 * scale}px)`);
      progress.style.display = settings().progressVisible ? "" : "none";
      canvas.style.opacity = settings().particleAmount > 0 ? 0.28 + settings().particleAmount / 140 : 0;
      state.palette = theme.particles.map(hexToRgb);
    }

    function renderQuote() {
      const theme = activeTextTheme();
      const duration = settings().quoteSeconds * 1000;
      const cycle = Math.floor(Date.now() / duration);
      const offset = config.defaults.quoteDisplayMode ? state.screenSlot - 1 : 0;
      const index = settings().randomOrder
        ? hash(`${theme.id}:${cycle + offset * 997}`) % theme.quotes.length
        : (cycle + offset) % theme.quotes.length;
      const quote = theme.quotes[index];
      const key = `${theme.id}:${index}:${quote.text}:${quote.author || ""}`;

      if (key !== state.lastKey) {
        state.lastKey = key;
        quoteIndex.textContent = `${theme.label} ${String(index + 1).padStart(2, "0")}`;
        quoteText.innerHTML = `<span>${escapeHtml(quote.text)}</span>`;
        quoteAuthor.textContent = quote.author || theme.label;
        playTransition();
      }

      progressBar.style.transform = `scaleX(${(Date.now() % duration) / duration})`;
    }

    function playTransition() {
      const effects = ["fade", "slide", "rise", "scale", "glitch"];
      quoteWrap.classList.remove(...effects.map((effect) => `fx-${effect}`));
      let effect = settings().transitionEffect;
      if (effect === "none") return;
      if (effect === "random") {
        effect = effects[hash(`${state.lastKey}:${Date.now()}`) % effects.length];
      }
      void quoteWrap.offsetWidth;
      quoteWrap.classList.add(`fx-${effect}`);
    }

    function seedParticles() {
      const density = settings().particleAmount / 100;
      const count = density === 0 ? 0 : Math.max(18, Math.floor((innerWidth * innerHeight) / (42000 / density)));
      state.particles = Array.from({ length: count }, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 0.38,
        vy: (Math.random() - 0.5) * 0.28,
        size: 1 + Math.random() * 2.4,
        hue: Math.floor(Math.random() * 3)
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      const speed = settings().particleSpeed / 100;

      for (const particle of state.particles) {
        particle.x = wrap(particle.x + particle.vx * speed, -20, innerWidth + 20);
        particle.y = wrap(particle.y + particle.vy * speed, -20, innerHeight + 20);
        const color = state.palette[particle.hue] || state.palette[0];
        ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},0.36)`;
        ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
      }

      for (let i = 0; i < state.particles.length; i++) {
        for (let j = i + 1; j < state.particles.length; j++) {
          const a = state.particles[i];
          const b = state.particles[j];
          const distance = Math.hypot(a.x - b.x, a.y - b.y);
          if (distance < 126) {
            ctx.strokeStyle = `rgba(244,239,228,${0.075 * (1 - distance / 126)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      renderQuote();
      requestAnimationFrame(draw);
    }

    function resize() {
      const scale = devicePixelRatio || 1;
      canvas.width = Math.floor(innerWidth * scale);
      canvas.height = Math.floor(innerHeight * scale);
      canvas.style.width = `${innerWidth}px`;
      canvas.style.height = `${innerHeight}px`;
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      applyTheme();
      seedParticles();
      renderQuote();
    }

    function signalWallSetScreenSlot(slot) {
      state.screenSlot = clamp(Number(slot) || 3, 1, 3);
      applyTheme();
      renderQuote();
    }

    window.signalWallSetScreenSlot = signalWallSetScreenSlot;
    window.livelyPropertyListener = (name, value) => {
      if (name === "screenSlot") signalWallSetScreenSlot(value);
    };

    function hexToRgb(value) {
      const hex = String(value || "").replace("#", "");
      if (!/^[0-9a-f]{6}$/i.test(hex)) return [240, 179, 90];
      return [parseInt(hex.slice(0, 2), 16), parseInt(hex.slice(2, 4), 16), parseInt(hex.slice(4, 6), 16)];
    }

    function hash(value) {
      let result = 2166136261;
      for (const char of String(value)) {
        result ^= char.charCodeAt(0);
        result = Math.imul(result, 16777619);
      }
      return result >>> 0;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function wrap(value, min, max) {
      if (value < min) return max;
      if (value > max) return min;
      return value;
    }

    addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
