<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">SignalWall screen layout and display modes</title>
  <desc id="desc">A diagram showing screen order, quote mode, text theme mode, and color theme mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0c"/>
      <stop offset="1" stop-color="#081011"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0b35a"/>
      <stop offset=".52" stop-color="#5fc4b8"/>
      <stop offset="1" stop-color="#d86c77"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="760" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="88" fill="#fff8ed" font-size="42" font-weight="820">Multi-screen workflow</text>
    <text x="72" y="126" fill="#d7d1c5" opacity=".72" font-size="22" font-weight="650">Choose physical order, then decide what is global and what is per screen.</text>
    <g transform="translate(72 188)">
      <rect width="396" height="238" rx="14" fill="#111716" stroke="#2d3a36"/>
      <rect x="28" y="34" width="340" height="130" rx="10" fill="#171410"/>
      <text x="44" y="82" fill="#fff8ed" font-size="30" font-weight="820">Left monitor</text>
      <text x="44" y="122" fill="#94c7bd" font-size="22" font-weight="760">Screen slot 2</text>
      <text x="28" y="204" fill="#d7d1c5" font-size="20" font-weight="760">Theme: Design / Paper Dark</text>
    </g>
    <g transform="translate(520 160)">
      <rect width="396" height="266" rx="14" fill="#f8f4ea" stroke="#c9d3cf"/>
      <rect x="28" y="34" width="340" height="144" rx="10" fill="#fffdf7"/>
      <text x="44" y="88" fill="#20252a" font-size="32" font-weight="820">Center monitor</text>
      <text x="44" y="130" fill="#2b6f73" font-size="23" font-weight="760">Screen slot 3</text>
      <text x="28" y="218" fill="#546463" font-size="20" font-weight="760">Theme: Focus / Paper Light</text>
    </g>
    <g transform="translate(968 188)">
      <rect width="396" height="238" rx="14" fill="#121316" stroke="#2d3a36"/>
      <rect x="28" y="34" width="340" height="130" rx="10" fill="#0d0f11"/>
      <text x="44" y="82" fill="#fff8ed" font-size="30" font-weight="820">Right monitor</text>
      <text x="44" y="122" fill="#f0b35a" font-size="22" font-weight="760">Screen slot 1</text>
      <text x="28" y="204" fill="#d7d1c5" font-size="20" font-weight="760">Theme: Strategy / Signal</text>
    </g>
    <path d="M242 484H1196" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(134 548)">
      <rect width="258" height="92" rx="12" fill="#151a18" stroke="#2d3a36"/>
      <text x="24" y="38" fill="#fff8ed" font-size="22" font-weight="820">Quote mode</text>
      <text x="24" y="66" fill="#d7d1c5" opacity=".72" font-size="17" font-weight="650">Same or per screen</text>
    </g>
    <g transform="translate(424 548)">
      <rect width="258" height="92" rx="12" fill="#151a18" stroke="#2d3a36"/>
      <text x="24" y="38" fill="#fff8ed" font-size="22" font-weight="820">Text themes</text>
      <text x="24" y="66" fill="#d7d1c5" opacity=".72" font-size="17" font-weight="650">Global or per screen</text>
    </g>
    <g transform="translate(714 548)">
      <rect width="258" height="92" rx="12" fill="#151a18" stroke="#2d3a36"/>
      <text x="24" y="38" fill="#fff8ed" font-size="22" font-weight="820">Color themes</text>
      <text x="24" y="66" fill="#d7d1c5" opacity=".72" font-size="17" font-weight="650">Global or per screen</text>
    </g>
    <g transform="translate(1004 548)">
      <rect width="258" height="92" rx="12" fill="#151a18" stroke="#2d3a36"/>
      <text x="24" y="38" fill="#fff8ed" font-size="22" font-weight="820">Screen order</text>
      <text x="24" y="66" fill="#d7d1c5" opacity=".72" font-size="17" font-weight="650">Left / center / right</text>
    </g>
  </g>
</svg>
