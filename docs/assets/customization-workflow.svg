<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">SignalWall customization workflow</title>
  <desc id="desc">A three-column interface showing wallpaper settings, theme modes, and quote theme editing.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#e8efec"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b6f73"/>
      <stop offset=".5" stop-color="#9c6b2f"/>
      <stop offset="1" stop-color="#735d91"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#page)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="82" fill="#111715" font-size="40" font-weight="820">Quote Signal Control Center</text>
    <text x="72" y="118" fill="#546463" font-size="22" font-weight="650">All wallpaper settings, screen layout, themes, and phrases in one place.</text>
    <rect x="1038" y="48" width="128" height="48" rx="8" fill="#111715"/>
    <text x="1072" y="79" fill="#fffdf7" font-size="17" font-weight="800">Dark</text>
    <rect x="1188" y="48" width="180" height="48" rx="8" fill="#2b6f73"/>
    <text x="1220" y="79" fill="#fffdf7" font-size="17" font-weight="800">Save and apply</text>
    <g transform="translate(72 168)">
      <rect width="1296" height="170" rx="12" fill="#fffdf7" stroke="#cdd7d3"/>
      <text x="24" y="42" fill="#111715" font-size="28" font-weight="820">Wallpaper</text>
      <g transform="translate(24 76)" fill="#273331" font-size="18" font-weight="760">
        <text x="0" y="0">Seconds per quote</text>
        <text x="278" y="0">Text size</text>
        <text x="520" y="0">Particles</text>
        <text x="754" y="0">Particle speed</text>
        <text x="1012" y="0">Grid opacity</text>
      </g>
      <g transform="translate(24 100)" stroke="#94a39f" stroke-width="4" stroke-linecap="round">
        <line x1="0" y1="0" x2="220" y2="0"/>
        <line x1="278" y1="0" x2="482" y2="0"/>
        <line x1="520" y1="0" x2="704" y2="0"/>
        <line x1="754" y1="0" x2="944" y2="0"/>
        <line x1="1012" y1="0" x2="1216" y2="0"/>
        <line x1="0" y1="0" x2="194" y2="0" stroke="#2b6f73"/>
        <line x1="278" y1="0" x2="398" y2="0" stroke="#2b6f73"/>
        <line x1="520" y1="0" x2="650" y2="0" stroke="#2b6f73"/>
        <line x1="754" y1="0" x2="880" y2="0" stroke="#2b6f73"/>
        <line x1="1012" y1="0" x2="1128" y2="0" stroke="#2b6f73"/>
      </g>
      <g fill="#2b6f73">
        <circle cx="218" cy="100" r="10"/>
        <circle cx="422" cy="100" r="10"/>
        <circle cx="674" cy="100" r="10"/>
        <circle cx="904" cy="100" r="10"/>
        <circle cx="1152" cy="100" r="10"/>
      </g>
      <rect x="1044" y="26" width="132" height="38" rx="8" fill="#edf3f0" stroke="#cdd7d3"/>
      <text x="1080" y="51" fill="#111715" font-size="15" font-weight="800">Progress</text>
      <rect x="1190" y="26" width="132" height="38" rx="8" fill="#edf3f0" stroke="#cdd7d3"/>
      <text x="1227" y="51" fill="#111715" font-size="15" font-weight="800">Random</text>
      <rect x="1038" y="37" width="16" height="16" rx="3" fill="#2b6f73"/>
      <rect x="1184" y="37" width="16" height="16" rx="3" fill="#2b6f73"/>
    </g>
    <g transform="translate(72 376)">
      <rect width="408" height="400" rx="12" fill="#fffdf7" stroke="#cdd7d3"/>
      <text x="24" y="40" fill="#111715" font-size="25" font-weight="820">Screen left</text>
      <rect x="24" y="66" width="360" height="124" rx="10" fill="#111715"/>
      <text x="44" y="108" fill="#f4efe4" font-size="22" font-weight="820">Different quote</text>
      <text x="44" y="142" fill="#d9d0b2" font-size="18" font-weight="760">Design theme</text>
      <rect x="24" y="220" width="360" height="46" rx="8" fill="#edf3f0" stroke="#bccbc6"/>
      <text x="44" y="250" fill="#111715" font-size="17" font-weight="760">Text theme: Design</text>
      <rect x="24" y="286" width="360" height="46" rx="8" fill="#edf3f0" stroke="#bccbc6"/>
      <text x="44" y="316" fill="#111715" font-size="17" font-weight="760">Color theme: Paper Dark</text>
      <rect x="24" y="352" width="114" height="18" fill="#d9b56f"/>
      <rect x="148" y="352" width="114" height="18" fill="#94c7bd"/>
      <rect x="272" y="352" width="112" height="18" fill="#b58bd7"/>
    </g>
    <g transform="translate(520 376)">
      <rect width="408" height="400" rx="12" fill="#fffdf7" stroke="#cdd7d3"/>
      <text x="24" y="40" fill="#111715" font-size="25" font-weight="820">Screen center</text>
      <rect x="24" y="66" width="360" height="124" rx="10" fill="#f8f4ea"/>
      <text x="44" y="108" fill="#20252a" font-size="22" font-weight="820">Same or different</text>
      <text x="44" y="142" fill="#546463" font-size="18" font-weight="760">Focus theme</text>
      <rect x="24" y="220" width="360" height="46" rx="8" fill="#edf3f0" stroke="#bccbc6"/>
      <text x="44" y="250" fill="#111715" font-size="17" font-weight="760">Screen order: 2, 3, 1</text>
      <rect x="24" y="286" width="360" height="46" rx="8" fill="#edf3f0" stroke="#bccbc6"/>
      <text x="44" y="316" fill="#111715" font-size="17" font-weight="760">Transition: rise / slide / glitch</text>
      <path d="M24 360H384" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g transform="translate(968 376)">
      <rect width="400" height="400" rx="12" fill="#fffdf7" stroke="#cdd7d3"/>
      <text x="24" y="40" fill="#111715" font-size="25" font-weight="820">Quote themes</text>
      <text x="24" y="76" fill="#546463" font-size="17" font-weight="650">One phrase per line becomes one input.</text>
      <rect x="24" y="104" width="352" height="220" rx="10" fill="#f5f0e7" stroke="#cdd7d3"/>
      <text x="44" y="142" fill="#111715" font-size="18" font-weight="760">Every pixel argues for attention.</text>
      <text x="44" y="184" fill="#111715" font-size="18" font-weight="760">Quiet systems age better.</text>
      <text x="44" y="226" fill="#111715" font-size="18" font-weight="760">Good screens keep intent visible.</text>
      <text x="44" y="268" fill="#111715" font-size="18" font-weight="760">Motion should reveal.</text>
      <rect x="24" y="340" width="164" height="44" rx="8" fill="#2b6f73"/>
      <text x="60" y="368" fill="#fffdf7" font-size="16" font-weight="800">Add theme</text>
    </g>
  </g>
</svg>
